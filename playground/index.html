<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subframe Playground</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./app.ts" type="module"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>subframe</h1>
      <span class="version">playground</span>
    </header>

    <main>
      <div class="player-container">
        <div class="video-wrapper">
          <video id="video" crossorigin="anonymous"></video>
          <canvas id="subtitle-canvas"></canvas>
        </div>

        <div class="controls">
          <button id="play-pause" title="Play/Pause">▶</button>
          <input type="range" id="timeline" min="0" max="100" value="0" step="0.1">
          <span id="time-display">00:00.000 / 00:00.000</span>
          <label class="toggle">
            <input type="checkbox" id="render-mode">
            <span>Render at PlayRes</span>
          </label>
        </div>
      </div>

      <div class="panel">
        <section class="load-section">
          <h2>Load Files</h2>
          <div class="file-inputs">
            <label class="file-btn">
              <span>Video</span>
              <input type="file" id="video-input" accept="video/*">
            </label>
            <label class="file-btn">
              <span>Subtitle (.ass)</span>
              <input type="file" id="subtitle-input" accept=".ass,.ssa">
            </label>
            <label class="file-btn">
              <span>Fonts (.ttf/.otf)</span>
              <input type="file" id="font-input" accept=".ttf,.otf,.ttc,.otc,.woff,.woff2" multiple>
            </label>
            <button id="local-fonts-btn" title="Query system fonts (Chrome/Edge only)">System Fonts</button>
          </div>
        </section>

        <section class="status-section">
          <h2>Status</h2>
          <div id="status">
            <div class="status-row">
              <span class="label">Video:</span>
              <span id="video-status" class="value">not loaded</span>
            </div>
            <div class="status-row">
              <span class="label">Subtitle:</span>
              <span id="subtitle-status" class="value">not loaded</span>
            </div>
            <div class="status-row">
              <span class="label">Fonts:</span>
              <span id="font-status" class="value">0 loaded</span>
            </div>
            <div class="status-row">
              <span class="label">Render:</span>
              <span id="render-status" class="value">idle</span>
            </div>
          </div>
        </section>

        <section class="background-section">
          <h2>Background</h2>
          <div class="bg-controls">
            <label>
              <span>Mode</span>
              <select id="bg-mode">
                <option value="checker">Checker</option>
                <option value="solid">Solid</option>
                <option value="gradient">Gradient</option>
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </label>
            <label>
              <span>Color A</span>
              <input type="color" id="bg-color-a" value="#1a1a1a">
            </label>
            <label>
              <span>Color B</span>
              <input type="color" id="bg-color-b" value="#0f0f0f">
            </label>
          </div>
        </section>

        <section class="perf-section">
          <h2>Performance</h2>
          <div id="perf-stats">
            <div class="status-row">
              <span class="label">Render:</span>
              <span id="perf-render" class="value">-</span>
            </div>
            <div class="status-row">
              <span class="label">Composite:</span>
              <span id="perf-composite" class="value">-</span>
            </div>
            <div class="status-row">
              <span class="label">Total:</span>
              <span id="perf-total" class="value">-</span>
            </div>
            <div class="status-row">
              <span class="label">Layers:</span>
              <span id="perf-layers" class="value">-</span>
            </div>
            <div class="status-row">
              <span class="label">Memory:</span>
              <span id="perf-memory" class="value">-</span>
            </div>
          </div>
          <div class="perf-graphs">
            <div class="graph">
              <span class="graph-label">Frame time (ms)</span>
              <canvas id="perf-graph" width="240" height="60"></canvas>
            </div>
            <div class="graph">
              <span class="graph-label">Frame bitmap (MB)</span>
              <canvas id="memory-graph" width="240" height="60"></canvas>
            </div>
          </div>
        </section>

        <section class="fonts-section">
          <h2>Loaded Fonts</h2>
          <ul id="font-list"></ul>
        </section>
      </div>
    </main>

    <div id="log-container">
      <h2>Log</h2>
      <pre id="log"></pre>
    </div>
  </div>
</body>
</html>
